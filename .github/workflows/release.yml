name: release

# Push a tag like v0.1.0 to build cross-platform `cairn` binaries and attach them to a Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-13, target: x86_64-apple-darwin }
          - { os: macos-14, target: aarch64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: endsWith(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: |
          dir="target/${{ matrix.target }}/release"
          tar -C "$dir" -czf "cairn-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" cairn

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/cairn.exe" -DestinationPath "cairn-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cairn-*.tar.gz
            cairn-*.zip
          generate_release_notes: true
