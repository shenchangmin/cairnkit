# cairnkit baseline config for Codex (~/.codex/config.toml). Review + merge as desired —
# sync-to-codex.sh does not overwrite your config. See https://developers.openai.com/codex/multi-agent

# Codex multi-agent is what lets cairnkit dispatch isolated role agents (parent orchestrator →
# product / tech / architect / dev / verify / … sub-agents) instead of one agent playing every
# role. Keep it on so the role profiles in ~/.codex/agents/ are used.
multi_agent = true

# The parent orchestrator follows the cairnkit block in AGENTS.md.
persistent_instructions = "Follow project AGENTS.md guidelines, including the cairnkit delivery loop."

[agents]
# cairnkit role agents are installed as ~/.codex/agents/<role>.toml (product, tech, architect-be,
# architect-fe, dev, verify, visual, archiver, doc-collector, codebase-profiler, knowledge-builder).
# Each carries its own reasoning effort, sandbox, and developer_instructions (the role mandate).

[cairnkit]
# cairnkit drives the deterministic `cairn` binary; ensure it is on PATH.
engine = "cairn"
